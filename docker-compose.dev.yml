services:
  db:
    image: postgres:latest
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: dev_db
    volumes:
      - pgdata:/var/lib/postgresql
    container_name: db
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/var/www
      - ./docker/development/nginx/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
      - ./docker/development/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - server
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        COMPOSER_FLAGS: ""
    develop:
      watch:
        - action: sync
          path: .
          target: /var/www
    container_name: server
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - ./docker/development/php/opcache.ini:/usr/local/etc/php/conf.d/opcache-disable.ini:ro
    working_dir: /var/www
    entrypoint: sh -c "composer install && php-fpm -F"
  web:
    image: node:20-alpine
    container_name: web
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/development/nginx/certs:/etc/certs:ro
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
