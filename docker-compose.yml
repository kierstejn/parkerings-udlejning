services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        COMPOSER_FLAGS: "--no-dev"
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    environment:
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_DEBUG: ${APP_DEBUG}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-parkering}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_URL: ${AWS_URL}
      AWS_USE_PATH_STYLE_ENDPOINT: "true"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    depends_on:
      - app

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
