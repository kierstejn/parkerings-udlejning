services:
  db:
    image: postgres:latest
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: dev_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    container_name: db
  server:
    build:
      context: .
      dockerfile: Dockerfile
    develop:
      watch:
        - action: sync
          path: .
          target: /var/www
    container_name: server
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    working_dir: /var/www
    command: >
      sh -c "composer install &&
             php artisan serve --host=0.0.0.0 --port=8000"
volumes:
  pgdata:
